<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Hoobert owl">
  <title>Hoobert</title>
  <!--
    Hoobert's owl mark, redrawn as vector from the "funny owl" icon by agustrisana
    (Flaticon). Attribution ships on the settings page and in readme.txt.
    Palette is Fernfly's: ochre body, beige face, orange beak and feet.
  -->
  <g id="hoobert-owl">
    <!-- Ear tufts, drawn under the body so they merge into the head -->
    <path fill="#A87C2C" d="M108 6c32 34 50 56 60 76-28 10-52 22-72 38-4-40 0-80 12-114Z"/>
    <path fill="#A87C2C" d="M404 6c-32 34-50 56-60 76 28 10 52 22 72 38 4-40 0-80-12-114Z"/>

    <!-- Tail, poking out behind the lower right -->
    <path fill="#D9C199" d="M414 392c24 30 46 50 64 60l-72-4Z"/>

    <!-- Body -->
    <path fill="#A87C2C" d="M256 30c84 0 174 75 189 200 15 120-55 250-189 250S52 350 67 230C82 105 172 30 256 30Z"/>

    <!-- Wings -->
    <path fill="#D9C199" d="M80 240c-20 65-8 128 26 162 26-40 32-106 16-164-14-6-28-6-42 2Z"/>
    <path fill="#D9C199" d="M432 240c20 65 8 128-26 162-26-40-32-106-16-164 14-6 28-6 42 2Z"/>

    <!-- Belly scallops: three staggered rows -->
    <g fill="#D9C199">
      <path d="M150 330a18 18 0 0 0 36 0h-10a8 8 0 0 1-16 0Z"/>
      <path d="M194 330a18 18 0 0 0 36 0h-10a8 8 0 0 1-16 0Z"/>
      <path d="M238 330a18 18 0 0 0 36 0h-10a8 8 0 0 1-16 0Z"/>
      <path d="M282 330a18 18 0 0 0 36 0h-10a8 8 0 0 1-16 0Z"/>
      <path d="M326 330a18 18 0 0 0 36 0h-10a8 8 0 0 1-16 0Z"/>

      <path d="M172 380a18 18 0 0 0 36 0h-10a8 8 0 0 1-16 0Z"/>
      <path d="M216 380a18 18 0 0 0 36 0h-10a8 8 0 0 1-16 0Z"/>
      <path d="M260 380a18 18 0 0 0 36 0h-10a8 8 0 0 1-16 0Z"/>
      <path d="M304 380a18 18 0 0 0 36 0h-10a8 8 0 0 1-16 0Z"/>

      <path d="M150 430a18 18 0 0 0 36 0h-10a8 8 0 0 1-16 0Z"/>
      <path d="M194 430a18 18 0 0 0 36 0h-10a8 8 0 0 1-16 0Z"/>
      <path d="M238 430a18 18 0 0 0 36 0h-10a8 8 0 0 1-16 0Z"/>
      <path d="M282 430a18 18 0 0 0 36 0h-10a8 8 0 0 1-16 0Z"/>
      <path d="M326 430a18 18 0 0 0 36 0h-10a8 8 0 0 1-16 0Z"/>
    </g>

    <!-- Face mask: two lobes plus a centre peak -->
    <g fill="#F2E7D7">
      <path d="M256 78c36 24 56 58 58 102H198c2-44 22-78 58-102Z"/>
      <circle cx="176" cy="176" r="90"/>
      <circle cx="336" cy="176" r="90"/>
    </g>

    <!-- Eyes -->
    <circle cx="176" cy="176" r="63" fill="#FFFFFF"/>
    <circle cx="336" cy="176" r="63" fill="#FFFFFF"/>
    <circle cx="170" cy="170" r="46" fill="#000000"/>
    <circle cx="330" cy="170" r="46" fill="#000000"/>
    <circle cx="150" cy="152" r="10" fill="#FFFFFF"/>
    <circle cx="310" cy="152" r="10" fill="#FFFFFF"/>

    <!-- Beak -->
    <path fill="#F79021" d="M224 202h64c0 34-16 60-32 70-16-10-32-36-32-70Z"/>

    <!-- Feet -->
    <g fill="#F79021">
      <rect x="184" y="458" width="26" height="42" rx="12"/>
      <rect x="216" y="458" width="26" height="42" rx="12"/>
      <rect x="272" y="458" width="26" height="42" rx="12"/>
      <rect x="304" y="458" width="26" height="42" rx="12"/>
    </g>
  </g>
</svg>
