# Local WooCommerce stack for Hoobert development.
#
#   docker compose up -d          # bring up db + wordpress
#   ./scripts/setup.sh            # install WP + WooCommerce, sample data, API keys
#   open http://localhost:8080/wp-admin
#
# The plugin source is bind-mounted into wp-content/plugins, so edits are live
# (rebuild the JS bundle with `npm run build` inside plugin/hoobert).

services:
  db:
    image: mariadb:11.4.5
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${WORDPRESS_DB_NAME:-wordpress}
      MARIADB_USER: ${WORDPRESS_DB_USER:-wordpress}
      MARIADB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-wordpress}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-rootpass}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  wordpress:
    # Base image (wordpress:7.0.0-php8.5-apache) is pinned in docker/Dockerfile,
    # which layers Xdebug on top for step-debugging. Rebuild with `--build`.
    build:
      context: .
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WP_PORT:-8080}:80"
    # Lets Xdebug reach the IDE via host.docker.internal on Linux too.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-wordpress}
    volumes:
      - wp_data:/var/www/html
      - ./plugin/hoobert:/var/www/html/wp-content/plugins/hoobert
      - ./scripts:/scripts

  # WP-CLI runner that provisions the stack on `docker compose up`: it waits for
  # WordPress + the database, then runs scripts/setup.sh (idempotent, safe to
  # re-run). It exits when done. Re-provision after building the plugin with
  #   docker compose run --rm wpcli
  # Run an ad-hoc WP-CLI command with:
  #   docker compose run --rm --entrypoint wp wpcli <command>
  wpcli:
    image: wordpress:cli-2.12.0-php8.5
    restart: "no"
    # The Alpine cli image's www-data is uid 82, but the Debian wordpress image
    # owns /var/www/html as uid 33. Run as 33 so wp-cli can write wp-content.
    user: "33:33"
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_started
    environment:
      # uid 33 has no home in this image; point HOME at a writable dir for wp-cli.
      HOME: /tmp
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME:-wordpress}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER:-wordpress}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD:-wordpress}
      WP_SITE_URL: http://localhost:${WP_PORT:-8080}
      WP_ADMIN_USER: ${WP_ADMIN_USER:-admin}
      WP_ADMIN_PASSWORD: ${WP_ADMIN_PASSWORD:-admin_password}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL:-admin@example.com}
      WP_SITE_TITLE: ${WP_SITE_TITLE:-Hoobert Dev Store}
    volumes:
      - wp_data:/var/www/html
      - ./plugin/hoobert:/var/www/html/wp-content/plugins/hoobert
      - ./scripts:/scripts
    entrypoint: ["/bin/sh", "/scripts/setup.sh"]

volumes:
  db_data:
  wp_data:
