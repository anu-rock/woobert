; Xdebug 3 config for local step-debugging.
;
; start_with_request=yes so every request (including the fetch-triggered
; /hoobert/v1/resolve REST call) opens a debug session; the IDE only pauses at
; breakpoints. Switch to "trigger" if you'd rather gate it behind XDEBUG_TRIGGER.
xdebug.mode=debug,develop
xdebug.start_with_request=yes

; host.docker.internal resolves to the host (see extra_hosts in docker-compose).
xdebug.client_host=host.docker.internal
xdebug.client_port=9003
xdebug.discover_client_host=false

; Fail fast when the IDE isn't listening, so undebugged requests aren't slowed.
xdebug.connect_timeout_ms=200
xdebug.log_level=0
